<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Contrato - Bevilacqua</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #911419; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px;}
        .section-title { margin-top: 25px; color: #333; font-size: 1.1em; font-weight: bold; border-left: 4px solid #911419; padding-left: 10px;}
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }
        .actions { display: none; gap: 10px; margin-top: 20px; }
        .actions.visible { display: grid; }
        button { width: 100%; padding: 12px; background-color: #911419; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer;}
        button:hover { background-color: #7a1115; }
        .secondary { background-color: #333; }
        .secondary:hover { background-color: #222; }
        .hint { margin-top: 12px; color: #666; font-size: 13px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Emissão de Contrato</h2>
        <form action="/gerar" method="POST">
            
            <div class="section-title">Dados do Cliente</div>
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" name="nome_cliente" required placeholder="Ex: João da Silva">
            </div>
            <div class="form-group">
                <label>CPF</label>
                <input type="text" name="cpf" required placeholder="Ex: 123.456.789-00" maxlength="14" inputmode="numeric">
            </div>

            <div class="section-title">Dados da Obra</div>
            <div class="row">
                <div class="form-group">
                    <label>Metragem (m²)</label>
                    <input type="text" name="metragem" required placeholder="Ex: 200 ou 200,5" inputmode="decimal">
                </div>
                <div class="form-group">
                    <label>Valor M² (R$)</label>
                    <input type="text" name="valor_m2" required placeholder="Ex: 80,00" inputmode="decimal">
                </div>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label>Cidade - SP</label>
                    <input type="text" name="cidade" required placeholder="Ex: São José dos Campos">
                </div>
                <div class="form-group">
                    <label>Nome do Condomínio</label>
                    <input type="text" name="condominio" required placeholder="Ex: Residencial Alphaville">
                </div>
            </div>

            <div class="section-title">Data de Emissão</div>
            <div class="row">
                <div class="form-group">
                    <label>Dia</label>
                    <input type="text" name="data_dia" required placeholder="Ex: 19" maxlength="2" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label>Mês (Extenso)</label>
                    <input type="text" name="data_mes" required placeholder="Ex: maio">
                </div>
                <div class="form-group">
                    <label>Ano</label>
                    <input type="text" name="data_ano" required placeholder="Ex: 2025" maxlength="4" inputmode="numeric">
                </div>
            </div>

            <div id="actions" class="actions">
                <button
                    type="submit"
                    formaction="/minuta"
                    formtarget="_blank"
                >
                    Ver Minuta
                </button>
                <button
                    type="submit"
                    class="secondary"
                    formaction="/proposta"
                    formtarget="_blank"
                >
                    Ver Proposta de Apresentação
                </button>
            </div>
            <p id="hint" class="hint">Preencha todos os campos para liberar as opções.</p>
        </form>
    </div>
    <script>
        const form = document.querySelector("form");
        const actions = document.getElementById("actions");
        const hint = document.getElementById("hint");
        const fields = Array.from(form.querySelectorAll("input[required]"));
        const cpfInput = form.querySelector("input[name='cpf']");
        const metragemInput = form.querySelector("input[name='metragem']");
        const valorM2Input = form.querySelector("input[name='valor_m2']");
        const diaInput = form.querySelector("input[name='data_dia']");
        const anoInput = form.querySelector("input[name='data_ano']");

        function isFilled(value) {
            return String(value || "").trim().length > 0;
        }

        function onlyDigits(value) {
            return String(value || "").replace(/\D/g, "");
        }

        function applyCpfMask(value) {
            const digits = onlyDigits(value).slice(0, 11);
            const parts = [];
            if (digits.length > 0) parts.push(digits.slice(0, 3));
            if (digits.length > 3) parts.push(digits.slice(3, 6));
            if (digits.length > 6) parts.push(digits.slice(6, 9));
            let formatted = parts.join(".");
            if (digits.length > 9) {
                formatted += "-" + digits.slice(9, 11);
            }
            return formatted;
        }

        function applyDecimalMask(value) {
            let text = String(value || "");
            text = text.replace(/[^\d,.\s]/g, "");
            text = text.replace(/\./g, ",");
            text = text.replace(/\s+/g, "");
            const firstComma = text.indexOf(",");
            if (firstComma >= 0) {
                const intPart = text.slice(0, firstComma).replace(/,/g, "");
                const decPart = text.slice(firstComma + 1).replace(/,/g, "");
                text = intPart + "," + decPart;
            } else {
                text = text.replace(/,/g, "");
            }
            return text;
        }

        function updateActionsVisibility() {
            const complete = fields.every((field) => isFilled(field.value));
            actions.classList.toggle("visible", complete);
            hint.style.display = complete ? "none" : "block";
        }

        cpfInput.addEventListener("input", () => {
            cpfInput.value = applyCpfMask(cpfInput.value);
            updateActionsVisibility();
        });

        [metragemInput, valorM2Input].forEach((input) => {
            input.addEventListener("input", () => {
                input.value = applyDecimalMask(input.value);
                updateActionsVisibility();
            });
        });

        diaInput.addEventListener("input", () => {
            diaInput.value = onlyDigits(diaInput.value).slice(0, 2);
            updateActionsVisibility();
        });

        anoInput.addEventListener("input", () => {
            anoInput.value = onlyDigits(anoInput.value).slice(0, 4);
            updateActionsVisibility();
        });

        fields.forEach((field) => {
            field.addEventListener("input", updateActionsVisibility);
            field.addEventListener("change", updateActionsVisibility);
        });

        updateActionsVisibility();
    </script>
</body>
</html>
